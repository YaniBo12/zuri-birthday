.carousel {

    max-width: 90%;
    margin: auto;
    overflow: hidden;
}
.carousel-track {
    display: flex;
    transition: transform 0.5s ease;
}
.carousel img {
    min-width: 100%;
    height: 350px;
    object-fit: cover;
    cursor: pointer;
}
.carousel button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    border: none;
    color: white;
    font-size: 2rem;
    cursor: pointer;
    z-index: 10;
}
.prev { left: 10px; }
.next { right: 10px; }

/* SECRET MESSAGE */
#secret {

    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 9999;

/* CARD */
.card {

    padding: 20px;
    border-radius: 15px;
}

/* HEARTS */
.heart {
    position: fixed;
    bottom: -10px;
    animation: floatUp 6s linear infinite;
}
@keyframes floatUp {
    to { transform: translateY(-100vh); opacity: 0; }
}

/* MUSIC SELECTION */
